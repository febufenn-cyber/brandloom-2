name = "brandloom-api"
main = "src/entry.ts"
compatibility_date = "2025-03-03"

[vars]
WEB_ORIGIN = "http://localhost:5173"
PUBLIC_API_ORIGIN = "http://localhost:8787"
BETA_APP_ORIGIN = "http://localhost:5173"
WAITLIST_CONSENT_VERSION = "waitlist-v1"
PUBLISHING_PROVIDER_MODE = "mock"
BILLING_PROVIDER_MODE = "mock"
META_OAUTH_USE_PKCE = "true"
DEPLOYMENT_ENVIRONMENT = "local"
APP_VERSION = "development"
COMMIT_SHA = "local"
EXPECTED_MIGRATION_VERSION = "0022"

[triggers]
crons = ["* * * * *"]

[env.staging]
name = "brandloom-api-staging"

[env.staging.vars]
DEPLOYMENT_ENVIRONMENT = "staging"
PUBLISHING_PROVIDER_MODE = "meta"
BILLING_PROVIDER_MODE = "stripe"
META_OAUTH_USE_PKCE = "true"
EXPECTED_MIGRATION_VERSION = "0022"

[env.staging.triggers]
crons = ["* * * * *"]

[env.production]
name = "brandloom-api-production"

[env.production.vars]
DEPLOYMENT_ENVIRONMENT = "production"
PUBLISHING_PROVIDER_MODE = "meta"
BILLING_PROVIDER_MODE = "stripe"
META_OAUTH_USE_PKCE = "true"
EXPECTED_MIGRATION_VERSION = "0022"

[env.production.triggers]
crons = ["* * * * *"]
