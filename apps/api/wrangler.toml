name = "brandloom-api"
main = "src/entry.ts"
compatibility_date = "2025-03-03"

[vars]
WEB_ORIGIN = "http://localhost:5173"
PUBLIC_API_ORIGIN = "http://localhost:8787"
BETA_APP_ORIGIN = "http://localhost:5173"
PUBLISHING_PROVIDER_MODE = "mock"
BILLING_PROVIDER_MODE = "mock"
META_OAUTH_USE_PKCE = "true"
DEPLOYMENT_ENVIRONMENT = "local"
APP_VERSION = "development"
COMMIT_SHA = "local"
EXPECTED_MIGRATION_VERSION = "0019"

[triggers]
crons = ["* * * * *"]

[env.staging]
name = "brandloom-api-staging"

[env.staging.vars]
DEPLOYMENT_ENVIRONMENT = "staging"
PUBLISHING_PROVIDER_MODE = "meta"
BILLING_PROVIDER_MODE = "stripe"
META_OAUTH_USE_PKCE = "true"
EXPECTED_MIGRATION_VERSION = "0019"

[env.staging.triggers]
crons = ["* * * * *"]

[env.production]
name = "brandloom-api-production"

[env.production.vars]
DEPLOYMENT_ENVIRONMENT = "production"
PUBLISHING_PROVIDER_MODE = "meta"
BILLING_PROVIDER_MODE = "stripe"
META_OAUTH_USE_PKCE = "true"
EXPECTED_MIGRATION_VERSION = "0019"

[env.production.triggers]
crons = ["* * * * *"]

# WEB_ORIGIN, PUBLIC_API_ORIGIN, BETA_APP_ORIGIN, APP_VERSION, COMMIT_SHA,
# SUPABASE_URL, SUPABASE_ANON_KEY, ANTHROPIC_MODEL and provider endpoint
# values are supplied by the deployment workflow or Cloudflare environment.
# Secrets must be provisioned per environment before deployment:
# SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY, TOKEN_ENCRYPTION_KEY,
# RATE_LIMIT_SALT, CRON_SECRET, META_APP_SECRET, META_WEBHOOK_VERIFY_TOKEN,
# STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET.
