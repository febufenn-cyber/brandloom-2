name: Deploy environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: Immutable release version
        required: true
        type: string
      confirmation:
        description: Type DEPLOY STAGING or DEPLOY PRODUCTION
        required: true
        type: string
      apply_migrations:
        description: Apply pending Supabase migrations
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-runtime.yml
    with:
      environment: ${{ inputs.environment }}
      version: ${{ inputs.version }}
      confirmation: ${{ inputs.confirmation }}
      apply_migrations: ${{ inputs.apply_migrations }}
    secrets: inherit
