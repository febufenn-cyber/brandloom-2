name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - name: Run checks
        shell: bash
        run: |
          set +e
          pnpm check 2>&1 | tee check.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-check-log
          path: check.log
          if-no-files-found: error
